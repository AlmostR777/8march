<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8 März Quest</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Orbitron',sans-serif;
color:white;
text-align:center;
min-height:100vh;
background:linear-gradient(-45deg,#0f0c29,#302b63,#ff0080,#24243e);
background-size:400% 400%;
animation:bg 18s ease infinite;
overflow:hidden;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.glitch{
font-size:28px;
margin-top:30px;
animation:glitch 1s infinite;
}

@keyframes glitch{
0%{text-shadow:2px 2px red,-2px -2px cyan}
50%{text-shadow:-2px 2px red,2px -2px cyan}
100%{text-shadow:2px -2px red,-2px 2px cyan}
}

.container{
background:rgba(0,0,0,0.6);
margin:30px auto;
padding:30px;
max-width:700px;
border-radius:20px;
box-shadow:0 0 30px rgba(255,0,255,0.3);
backdrop-filter:blur(10px);
}

button{
background:linear-gradient(45deg,#ff0080,#8000ff);
border:none;
color:white;
padding:10px 18px;
margin:8px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

input{
padding:8px;
border-radius:8px;
border:none;
margin-top:10px;
width:70%;
}

#letters{
margin-top:20px;
font-size:22px;
letter-spacing:10px;
color:#ff66cc;
}

.hearts{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
pointer-events:none;
}

.heart{
position:absolute;
color:#ff66cc;
animation:float 8s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0}
50%{opacity:1}
100%{transform:translateY(-10vh);opacity:0}
}
</style>
</head>
<body>

<div class="hearts" id="hearts"></div>

<h1 class="glitch">Ein besonderer Quest zum 8. März für Alisa 💖</h1>

<div class="container">
<div id="question"></div>
<div id="answers"></div>
<div id="result"></div>
<div id="letters">_ _ _ _ _ _ _ _</div>
</div>

<script>

let current=0;
const finalWord="herzlich";
let collected=["_","_","_","_","_","_","_","_"];

function normalize(text){
return text.toLowerCase().replace(/ё/g,"е").trim();
}

function updateLetters(){
document.getElementById("letters").innerText=collected.join(" ");
}

const questions=[

{type:"text",
q:"Как переводится слово 'Glück'?",
a:["счастье"],
fact:"Слово Glück в немецком означает и «счастье», и «удачу» — немцы считают, что это почти одно и то же 😉",
letter:null},

{type:"text",
q:"Кто подарил тебе этот квест? 😉",
a:["евгений","evgeniy","eugene","женя"],
fact:"И он несказанно этому рад ❤️",
letter:"h"},

{type:"audio",
q:"Угадай песню по аудио 🎧",
file:"track1.mp3",
a:["sonne"],
fact:"Sonne вышла в 2001 году и изначально была написана как песня для выхода боксёра на ринг.",
letter:"e"},

{type:"audio",
q:"Угадай песню по аудио 🎧",
file:"track2.mp3",
a:["engel"],
fact:"Engel — одна из самых узнаваемых песен Rammstein, а её свист в начале стал культовым.",
letter:"r"},

{type:"choice",
q:"Берлин — это...",
options:["город в Баварии","отдельная федеральная земля","часть Саксонии","город в Австрии"],
correct:1,
fact:"Берлин — один из трёх городов Германии, которые сами по себе являются федеральными землями.",
letter:null},

{type:"choice",
q:"Какой монастырь вырублен в скале в Грузии?",
options:["Гелати","Вардзия","Светицховели","Алаверди"],
correct:1,
fact:"Вардзия — это целый пещерный город XII века, где было более 600 помещений.",
letter:"z"},

{type:"choice",
q:"Какой древний храм стоит на берегу озера Севан?",
options:["Гегард","Хор Вирап","Севанаванк","Татев"],
correct:2,
fact:"Монастырь Севанаванк раньше находился на острове, но после снижения уровня воды стал полуостровом.",
letter:null},

{type:"text",
q:"Какая твоя любимая песня Rammstein? 😏",
a:["*"],
fact:"На самом деле здесь ты могла написать любую песню, потому что у Rammstein нет «правильной» любимой песни — потому что каждая заходит в разное настроение 😉",
letter:"l"},

{type:"choice",
q:"Самая высокая гора Германии?",
options:["Броккен","Цугшпитце","Фельдберг","Вацман"],
correct:1,
fact:"Цугшпитце — 2962 метра, и с её вершины видно сразу четыре страны.",
letter:null},

{type:"text",
q:"В каком году образовалась Rammstein?",
a:["1994"],
fact:"Группа собралась в Берлине и почти сразу выиграла музыкальный конкурс для молодых групп.",
letter:"i"},

{type:"text",
q:"Столица Армении?",
a:["ереван","yerevan"],
fact:"Ереван старше Рима почти на 30 лет.",
letter:null},

{type:"text",
q:"Город ветров?",
a:["баку","baku"],
fact:"Название Баку связывают с древним словом, означающим «удары ветра».",
letter:"c"},

{type:"text",
q:"Традиционный грузинский хлеб?",
a:["шоти","shoti"],
fact:"Шоти пекут в глиняной печи тонэ, и форма помогает хлебу равномерно пропекаться.",
letter:null},

{type:"text",
q:"Как по-немецки будет 'сердце'?",
a:["herz"],
fact:"Слово Herz входит во множество немецких выражений, например: von ganzem Herzen — «от всего сердца».",
letter:null},

{type:"text",
q:"Введи финальное кодовое слово ❤️",
a:["herzlich"],
fact:null,
letter:null}

];

function showQuestion(){
let q=questions[current];
document.getElementById("result").innerHTML="";
document.getElementById("question").innerHTML="<h2>"+q.q+"</h2>";
let answers=document.getElementById("answers");
answers.innerHTML="";

if(q.type==="text"){
answers.innerHTML='<input id="inputAnswer"><br><button onclick="checkText()">Ответить</button>';
}

if(q.type==="audio"){
answers.innerHTML='<audio controls src="'+q.file+'"></audio><br><input id="inputAnswer"><br><button onclick="checkText()">Ответить</button>';
}

if(q.type==="choice"){
q.options.forEach((opt,i)=>{
answers.innerHTML+='<button onclick="checkChoice('+i+')">'+opt+'</button><br>';
});
}
}

function giveLetter(letter){
if(letter){
let index=finalWord.indexOf(letter);
if(index!==-1 && collected[index]==="_"){
collected[index]=letter;
updateLetters();
}
}
}

function showFact(fact){
document.getElementById("question").innerHTML="<h2>Правильно ✅</h2>";
document.getElementById("answers").innerHTML="<p>"+fact+"</p><button onclick='next()'>Далее</button>";
}

function checkText(){
let val=normalize(document.getElementById("inputAnswer").value);

if(questions[current].a[0]==="*"){
giveLetter(questions[current].letter);
showFact(questions[current].fact);
return;
}

let correct=questions[current].a.map(normalize);

if(correct.includes(val)){
giveLetter(questions[current].letter);
if(questions[current].fact){
showFact(questions[current].fact);
}else{
next();
}
}else{
document.getElementById("result").innerHTML="❌ Попробуй ещё раз";
}
}

function checkChoice(i){
if(i===questions[current].correct){
giveLetter(questions[current].letter);
showFact(questions[current].fact);
}else{
document.getElementById("result").innerHTML="❌ Неа 😉";
}
}

function next(){
current++;
if(current<questions.length){
showQuestion();
}else{
document.getElementById("question").innerHTML="<h2>Ты прошла квест 💖<br>С 8 Марта!</h2>";
document.getElementById("answers").innerHTML="<p style='font-weight:normal'>Желаю тебе оставаться такой же женственной и красивой, будь всегда счастлива, любима и добра.<br>Поздравляю! Твой подарок уже тебя ждёт ❤️</p>";
document.getElementById("letters").innerHTML="";
}
}

updateLetters();
showQuestion();

for(let i=0;i<35;i++){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";
heart.style.left=Math.random()*100+"%";
heart.style.animationDuration=(5+Math.random()*5)+"s";
heart.style.fontSize=(10+Math.random()*20)+"px";
document.getElementById("hearts").appendChild(heart);
}

</script>
</body>
</html>
